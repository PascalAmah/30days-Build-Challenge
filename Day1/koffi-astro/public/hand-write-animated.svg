<svg width="122" height="125" viewBox="0 0 122 125" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes writeMotion {
    0%   { transform: rotate(-4deg) translate(0px, 0px); }
    25%  { transform: rotate(1deg) translate(1px, -0.5px); }
    50%  { transform: rotate(3deg) translate(0px, 0px); }
    75%  { transform: rotate(-1deg) translate(-1px, 0.5px); }
    100% { transform: rotate(-4deg) translate(0px, 0px); }
  }
  #hand-group {
    animation: writeMotion 1.6s ease-in-out infinite;
    transform-box: fill-box;
    transform-origin: 30% 70%;
  }

  @keyframes drawScribble {
    0%   { stroke-dashoffset: 1; opacity: 0; }
    8%   { opacity: 1; }
    55%  { stroke-dashoffset: 0; opacity: 1; }
    75%  { stroke-dashoffset: 0; opacity: 1; }
    92%  { opacity: 0; }
    100% { stroke-dashoffset: 1; opacity: 0; }
  }
  #scribble path {
    stroke-dasharray: 1;
    animation: drawScribble 1.6s ease-in-out infinite;
  }
  #scribble path:nth-child(2) {
    animation-delay: 0.05s;
  }
</style>

